<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Debug</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
        }
        .debug-info {
            margin: 20px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Snake Game Debug Test</h1>

    <div class="debug-info">
        <h3>Debug Log:</h3>
        <div id="debugLog"></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const log = document.getElementById('debugLog');

        function addLog(message) {
            log.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
            console.log(message);
        }

        addLog('Script started');

        try {
            const canvas = document.getElementById('gameCanvas');
            addLog('Canvas element found');

            const ctx = canvas.getContext('2d');
            addLog('Canvas context obtained');

            // Test drawing
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(50, 50, 100, 100);
            addLog('Red rectangle drawn');

            ctx.fillStyle = '#00ff00';
            ctx.fillRect(200, 200, 50, 50);
            addLog('Green rectangle drawn');

            // Test text
            ctx.fillStyle = '#ffffff';
            ctx.font = '20px Arial';
            ctx.fillText('Canvas Working!', 100, 300);
            addLog('Text drawn');

            addLog('✅ Canvas test PASSED');

        } catch (error) {
            addLog('❌ Error: ' + error.message);
        }
    </script>
</body>
</html>
